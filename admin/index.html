<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Monitor - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #2d3561 0%, #1f2544 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .status.connected {
            background: #4CAF50;
        }

        .status.disconnected {
            background: #f44336;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
        }

        .stat strong {
            display: block;
            font-size: 24px;
            margin-top: 5px;
        }

        .devices-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .device-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .device-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .device-info {
            flex: 1;
        }

        .device-id {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .device-ip {
            font-size: 14px;
            color: #b0b0ff;
        }

        .device-status {
            width: 12px;
            height: 12px;
            background: #4CAF50;
            border-radius: 50%;
            box-shadow: 0 0 10px #4CAF50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .device-video {
            width: 100%;
            border-radius: 10px;
            background: #000;
            aspect-ratio: 16/9;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .no-video {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            margin-top: 40px;
        }

        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 15px;
        }

        .empty-state p {
            color: #b0b0ff;
            font-size: 16px;
            line-height: 1.6;
        }

        .refresh-btn {
            background: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: #0b7dda;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4);
        }

        .device-time {
            font-size: 12px;
            color: #b0b0ff;
            margin-top: 10px;
        }

        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 10px;
            transition: background 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            🖥️ Baby Monitor Admin Panel
            <span class="status disconnected" id="serverStatus">Disconnected</span>
        </h1>
        <div class="stats">
            <div class="stat">
                Connected Cameras
                <strong id="cameraCount">0</strong>
            </div>
            <div class="stat">
                Total Devices
                <strong id="totalDevices">0</strong>
            </div>
            <button class="refresh-btn" id="refreshBtn">🔄 Refresh</button>
        </div>
    </div>

    <div class="devices-container" id="devicesContainer">
        <div class="empty-state">
            <h2>📱 No Cameras Connected</h2>
            <p>
                Waiting for mobile devices to connect...<br><br>
                Open the camera client page on your mobile device to start streaming.
            </p>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const devicesContainer = document.getElementById('devicesContainer');
        const serverStatus = document.getElementById('serverStatus');
        const cameraCount = document.getElementById('cameraCount');
        const totalDevices = document.getElementById('totalDevices');
        const refreshBtn = document.getElementById('refreshBtn');

        const devices = new Map();
        const videoElements = new Map();

        // Update server status
        socket.on('connect', () => {
            console.log('Connected to server');
            serverStatus.textContent = 'Connected';
            serverStatus.className = 'status connected';
            socket.emit('identify', { type: 'admin' });
            socket.emit('request-clients-list');
        });

        socket.on('disconnect', () => {
            console.log('Disconnected from server');
            serverStatus.textContent = 'Disconnected';
            serverStatus.className = 'status disconnected';
        });

        // Handle clients list
        socket.on('clients-list', (clients) => {
            console.log('Received clients list:', clients);
            clients.forEach(client => {
                addDevice(client);
            });
            updateStats();
        });

        // Handle new camera connection
        socket.on('camera-connected', (client) => {
            console.log('Camera connected:', client);
            addDevice(client);
            updateStats();
        });

        // Handle camera disconnection
        socket.on('camera-disconnected', (clientId) => {
            console.log('Camera disconnected:', clientId);
            removeDevice(clientId);
            updateStats();
        });

        // Handle incoming video data
        socket.on('video-data', (data) => {
            const { clientId, data: videoData } = data;
            updateVideoStream(clientId, videoData);
        });

        // Add device to the display
        function addDevice(client) {
            if (devices.has(client.id)) {
                return; // Device already exists
            }

            devices.set(client.id, client);

            const deviceCard = document.createElement('div');
            deviceCard.className = 'device-card';
            deviceCard.id = `device-${client.id}`;

            const connectedTime = new Date(client.connectedAt).toLocaleString();

            deviceCard.innerHTML = `
                <div class="device-header">
                    <div class="device-info">
                        <div class="device-id">📹 Camera ${devices.size}</div>
                        <div class="device-ip">IP: ${client.ip}</div>
                    </div>
                    <div class="device-status"></div>
                </div>
                <div class="no-video" id="video-placeholder-${client.id}">
                    ⏳ Waiting for stream...
                </div>
                <video
                    class="device-video"
                    id="video-${client.id}"
                    autoplay
                    playsinline
                    muted
                    style="display: none;"
                ></video>
                <div class="device-time">Connected: ${connectedTime}</div>
                <button class="fullscreen-btn" onclick="toggleFullscreen('video-${client.id}')">⛶ Fullscreen</button>
            `;

            // Clear empty state if this is the first device
            if (devices.size === 1) {
                devicesContainer.innerHTML = '';
            }

            devicesContainer.appendChild(deviceCard);

            // Create media source for this device
            const video = document.getElementById(`video-${client.id}`);
            const mediaSource = new MediaSource();
            videoElements.set(client.id, { video, mediaSource, chunks: [] });
        }

        // Remove device from display
        function removeDevice(clientId) {
            const deviceCard = document.getElementById(`device-${clientId}`);
            if (deviceCard) {
                deviceCard.remove();
            }

            devices.delete(clientId);
            videoElements.delete(clientId);

            // Show empty state if no devices
            if (devices.size === 0) {
                devicesContainer.innerHTML = `
                    <div class="empty-state">
                        <h2>📱 No Cameras Connected</h2>
                        <p>
                            Waiting for mobile devices to connect...<br><br>
                            Open the camera client page on your mobile device to start streaming.
                        </p>
                    </div>
                `;
            }

            updateStats();
        }

        // Update video stream
        function updateVideoStream(clientId, videoData) {
            const videoElement = videoElements.get(clientId);
            if (!videoElement) return;

            const { video } = videoElement;
            const placeholder = document.getElementById(`video-placeholder-${clientId}`);

            // Hide placeholder and show video
            if (placeholder) {
                placeholder.style.display = 'none';
            }
            video.style.display = 'block';

            // Convert base64 to blob
            fetch(videoData)
                .then(res => res.blob())
                .then(blob => {
                    const url = URL.createObjectURL(blob);
                    video.src = url;

                    // Clean up old URL
                    video.addEventListener('loadeddata', () => {
                        URL.revokeObjectURL(url);
                    }, { once: true });
                })
                .catch(err => {
                    console.error('Error playing video:', err);
                });
        }

        // Update statistics
        function updateStats() {
            cameraCount.textContent = devices.size;
            totalDevices.textContent = devices.size;
        }

        // Refresh button handler
        refreshBtn.addEventListener('click', () => {
            socket.emit('request-clients-list');
        });

        // Fullscreen function
        function toggleFullscreen(videoId) {
            const video = document.getElementById(videoId);
            if (!video) return;

            if (!document.fullscreenElement) {
                video.requestFullscreen().catch(err => {
                    console.error('Error attempting to enable fullscreen:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Make toggleFullscreen available globally
        window.toggleFullscreen = toggleFullscreen;
    </script>
</body>
</html>
