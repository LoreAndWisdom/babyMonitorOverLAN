<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Monitor - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #2d3561 0%, #1f2544 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .status.connected {
            background: #4CAF50;
        }

        .status.disconnected {
            background: #f44336;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
        }

        .stat strong {
            display: block;
            font-size: 24px;
            margin-top: 5px;
        }

        .devices-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .device-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .device-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .device-info {
            flex: 1;
        }

        .device-id {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .device-ip {
            font-size: 14px;
            color: #b0b0ff;
        }

        .device-status {
            width: 12px;
            height: 12px;
            background: #4CAF50;
            border-radius: 50%;
            box-shadow: 0 0 10px #4CAF50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .device-video {
            width: 100%;
            border-radius: 10px;
            background: #000;
            aspect-ratio: 16/9;
            object-fit: contain;
            transform: scaleX(-1);
            display: block;
        }

        .no-video {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            margin-top: 40px;
        }

        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 15px;
        }

        .empty-state p {
            color: #b0b0ff;
            font-size: 16px;
            line-height: 1.6;
        }

        .refresh-btn {
            background: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: #0b7dda;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4);
        }

        .device-time {
            font-size: 12px;
            color: #b0b0ff;
            margin-top: 10px;
        }

        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 10px;
            transition: background 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .audio-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .volume-slider {
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #4CAF50;
            cursor: pointer;
        }

        .volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #4CAF50;
            cursor: pointer;
            border: none;
        }

        .mute-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s ease;
            min-width: 40px;
        }

        .mute-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .mute-btn.muted {
            background: #f44336;
        }

        .volume-label {
            font-size: 12px;
            color: #b0b0ff;
            min-width: 35px;
        }

        .audio-notice {
            background: rgba(255, 193, 7, 0.2);
            border: 1px solid rgba(255, 193, 7, 0.5);
            color: #ffc107;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }

        .audio-notice.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            🖥️ Baby Monitor Admin Panel
            <span class="status disconnected" id="serverStatus">Disconnected</span>
        </h1>
        <div class="stats">
            <div class="stat">
                Connected Cameras
                <strong id="cameraCount">0</strong>
            </div>
            <div class="stat">
                Total Devices
                <strong id="totalDevices">0</strong>
            </div>
            <button class="refresh-btn" id="refreshBtn">🔄 Refresh</button>
        </div>
    </div>

    <div class="devices-container" id="devicesContainer">
        <div class="empty-state">
            <h2>📱 No Cameras Connected</h2>
            <p>
                Waiting for mobile devices to connect...<br><br>
                Open the camera client page on your mobile device to start streaming.
            </p>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const devicesContainer = document.getElementById('devicesContainer');
        const serverStatus = document.getElementById('serverStatus');
        const cameraCount = document.getElementById('cameraCount');
        const totalDevices = document.getElementById('totalDevices');
        const refreshBtn = document.getElementById('refreshBtn');

        const devices = new Map();
        const videoElements = new Map();

        // Update server status
        socket.on('connect', () => {
            console.log('Connected to server');
            serverStatus.textContent = 'Connected';
            serverStatus.className = 'status connected';
            socket.emit('identify', { type: 'admin' });
            socket.emit('request-clients-list');
        });

        socket.on('disconnect', () => {
            console.log('Disconnected from server');
            serverStatus.textContent = 'Disconnected';
            serverStatus.className = 'status disconnected';
        });

        // Handle clients list
        socket.on('clients-list', (clients) => {
            console.log('Received clients list:', clients);
            clients.forEach(client => {
                addDevice(client);
            });
            updateStats();
        });

        // Handle new camera connection
        socket.on('camera-connected', (client) => {
            console.log('Camera connected:', client);
            addDevice(client);
            updateStats();
        });

        // Handle camera disconnection
        socket.on('camera-disconnected', (clientId) => {
            console.log('Camera disconnected:', clientId);
            removeDevice(clientId);
            updateStats();
        });

        // Handle incoming video data
        socket.on('video-data', (data) => {
            const { clientId, data: videoData } = data;
            updateVideoStream(clientId, videoData);
        });

        // Handle incoming audio data
        socket.on('audio-data', (data) => {
            const { clientId, data: audioData } = data;
            updateAudioStream(clientId, audioData);
        });

        // Add device to the display
        function addDevice(client) {
            if (devices.has(client.id)) {
                return; // Device already exists
            }

            devices.set(client.id, client);

            const deviceCard = document.createElement('div');
            deviceCard.className = 'device-card';
            deviceCard.id = `device-${client.id}`;

            const connectedTime = new Date(client.connectedAt).toLocaleString();

            deviceCard.innerHTML = `
                <div class="device-header">
                    <div class="device-info">
                        <div class="device-id">📹 Camera ${devices.size}</div>
                        <div class="device-ip">IP: ${client.ip}</div>
                    </div>
                    <div class="device-status"></div>
                </div>
                <div class="no-video" id="video-placeholder-${client.id}">
                    ⏳ Waiting for stream...
                </div>
                <img
                    class="device-video"
                    id="video-${client.id}"
                    alt="Camera feed"
                    style="display: none;"
                />
                <div class="device-time">Connected: ${connectedTime}</div>
                <div class="audio-notice" id="audio-notice-${client.id}">
                    🔊 Click unmute to enable audio
                </div>
                <div class="audio-controls">
                    <button class="mute-btn muted" id="mute-${client.id}" onclick="toggleMute('${client.id}')">🔇</button>
                    <div class="volume-control">
                        <span class="volume-label">Vol:</span>
                        <input
                            type="range"
                            min="0"
                            max="100"
                            value="80"
                            class="volume-slider"
                            id="volume-${client.id}"
                            onchange="setVolume('${client.id}', this.value)"
                            oninput="setVolume('${client.id}', this.value)"
                        />
                        <span class="volume-label" id="volume-label-${client.id}">80%</span>
                    </div>
                </div>
                <button class="fullscreen-btn" onclick="toggleFullscreen('video-${client.id}')">⛶ Fullscreen</button>
            `;

            // Clear empty state if this is the first device
            if (devices.size === 1) {
                devicesContainer.innerHTML = '';
            }

            devicesContainer.appendChild(deviceCard);

            // Store reference to the image element
            const img = document.getElementById(`video-${client.id}`);

            // Create audio element for MediaSource Extensions
            const audio = new Audio();
            audio.volume = 0.8; // Default 80% volume
            audio.muted = true; // Start muted

            videoElements.set(client.id, {
                img,
                audio,
                mediaSource: null, // Will be created on user interaction
                sourceBuffer: null,
                audioQueue: [],
                isPlayingAudio: false,
                isMuted: true, // Start muted to comply with autoplay policies
                audioEnabled: false,
                sourceBufferReady: false,
                appendingChunk: false, // Track if we're currently appending
                volume: 0.8 // Default 80% volume
            });
        }

        // Remove device from display
        function removeDevice(clientId) {
            const deviceCard = document.getElementById(`device-${clientId}`);
            if (deviceCard) {
                deviceCard.remove();
            }

            // Clean up audio resources
            const element = videoElements.get(clientId);
            if (element) {
                if (element.audio) {
                    element.audio.pause();
                    element.audio.src = '';
                }
                if (element.mediaSource && element.mediaSource.readyState === 'open') {
                    try {
                        element.mediaSource.endOfStream();
                    } catch (e) {
                        // Ignore if already ended
                    }
                }
            }

            devices.delete(clientId);
            videoElements.delete(clientId);

            // Show empty state if no devices
            if (devices.size === 0) {
                devicesContainer.innerHTML = `
                    <div class="empty-state">
                        <h2>📱 No Cameras Connected</h2>
                        <p>
                            Waiting for mobile devices to connect...<br><br>
                            Open the camera client page on your mobile device to start streaming.
                        </p>
                    </div>
                `;
            }

            updateStats();
        }

        // Update video stream
        function updateVideoStream(clientId, videoData) {
            const videoElement = videoElements.get(clientId);
            if (!videoElement) return;

            const { img } = videoElement;
            const placeholder = document.getElementById(`video-placeholder-${clientId}`);

            // Hide placeholder and show image on first frame
            if (placeholder && placeholder.style.display !== 'none') {
                placeholder.style.display = 'none';
                img.style.display = 'block';
            }

            // Update image src with new frame
            img.src = videoData;
        }

        // Update audio stream
        function updateAudioStream(clientId, audioData) {
            const element = videoElements.get(clientId);
            if (!element) return;

            // Add audio chunk to queue
            element.audioQueue.push(audioData);

            // Process the queue if not muted and source buffer is ready
            if (!element.isMuted && element.sourceBufferReady) {
                processAudioQueue(clientId);
            }
        }

        // Play next audio chunk from queue
        function processAudioQueue(clientId) {
            const element = videoElements.get(clientId);
            if (!element) return;

            const { sourceBuffer, audioQueue, isMuted, sourceBufferReady, appendingChunk } = element;

            // Don't process if muted, source buffer not ready, or currently appending
            if (isMuted || !sourceBufferReady || !sourceBuffer || appendingChunk) {
                return;
            }

            // Check if SourceBuffer is ready to accept more data
            if (sourceBuffer.updating) {
                return;
            }

            // No more chunks to process
            if (audioQueue.length === 0) {
                return;
            }

            // Get next chunk and append to SourceBuffer
            const audioData = audioQueue.shift();
            element.appendingChunk = true;

            // Convert base64 to ArrayBuffer and append to SourceBuffer
            fetch(audioData)
                .then(res => res.arrayBuffer())
                .then(arrayBuffer => {
                    if (sourceBuffer && !sourceBuffer.updating && element.mediaSource.readyState === 'open') {
                        try {
                            sourceBuffer.appendBuffer(arrayBuffer);

                            // Manage buffer size - remove old data if buffer gets too large
                            if (sourceBuffer.buffered.length > 0) {
                                const bufferedEnd = sourceBuffer.buffered.end(0);
                                const currentTime = element.audio.currentTime;

                                // Keep only last 30 seconds of buffer
                                if (bufferedEnd - currentTime > 30) {
                                    const removeEnd = currentTime - 5;
                                    if (removeEnd > 0) {
                                        sourceBuffer.remove(0, removeEnd);
                                    }
                                }
                            }
                        } catch (e) {
                            console.error('Error appending audio chunk:', e);
                            element.appendingChunk = false;
                            // Try processing next chunk
                            setTimeout(() => processAudioQueue(clientId), 100);
                        }
                    } else {
                        element.appendingChunk = false;
                    }
                })
                .catch(err => {
                    console.error('Error loading audio chunk:', err);
                    element.appendingChunk = false;
                    // Try processing next chunk
                    setTimeout(() => processAudioQueue(clientId), 100);
                });
        }

        // Show audio notice
        function showAudioNotice(clientId) {
            const notice = document.getElementById(`audio-notice-${clientId}`);
            if (notice) {
                notice.classList.add('show');
            }
        }

        // Hide audio notice
        function hideAudioNotice(clientId) {
            const notice = document.getElementById(`audio-notice-${clientId}`);
            if (notice) {
                notice.classList.remove('show');
            }
        }

        // Update statistics
        function updateStats() {
            cameraCount.textContent = devices.size;
            totalDevices.textContent = devices.size;
        }

        // Refresh button handler
        refreshBtn.addEventListener('click', () => {
            socket.emit('request-clients-list');
        });

        // Fullscreen function
        function toggleFullscreen(videoId) {
            const video = document.getElementById(videoId);
            if (!video) return;

            if (!document.fullscreenElement) {
                video.requestFullscreen().catch(err => {
                    console.error('Error attempting to enable fullscreen:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Toggle mute for a device
        function toggleMute(clientId) {
            const element = videoElements.get(clientId);
            if (!element) return;

            element.isMuted = !element.isMuted;

            const muteBtn = document.getElementById(`mute-${clientId}`);
            if (element.isMuted) {
                muteBtn.textContent = '🔇';
                muteBtn.classList.add('muted');
                element.audio.muted = true;
                element.audioQueue = []; // Clear queue when muting
            } else {
                muteBtn.textContent = '🔊';
                muteBtn.classList.remove('muted');
                hideAudioNotice(clientId);

                // Unmute the audio element
                element.audio.muted = false;
                element.audio.volume = element.volume;

                // Create MediaSource on first unmute (user gesture required)
                if (!element.mediaSource) {
                    try {
                        element.mediaSource = new MediaSource();
                        element.audio.src = URL.createObjectURL(element.mediaSource);

                        element.mediaSource.addEventListener('sourceopen', () => {
                            if (element.mediaSource.readyState === 'open') {
                                try {
                                    element.sourceBuffer = element.mediaSource.addSourceBuffer('audio/webm;codecs=opus');
                                    element.sourceBufferReady = true;

                                    // Handle when chunk is done appending
                                    element.sourceBuffer.addEventListener('updateend', () => {
                                        element.appendingChunk = false;
                                        processAudioQueue(clientId);
                                    });

                                    // Start processing queued chunks
                                    processAudioQueue(clientId);
                                } catch (e) {
                                    console.error('Failed to create SourceBuffer:', e);
                                }
                            }
                        });
                    } catch (e) {
                        console.error('Failed to create MediaSource:', e);
                        return;
                    }
                }

                // Start playback if not already playing
                if (element.audio.paused) {
                    element.audio.play().catch(err => {
                        console.error('Failed to play audio:', err);
                        showAudioNotice(clientId);
                    });
                }
            }
        }

        // Set volume for a device
        function setVolume(clientId, value) {
            const element = videoElements.get(clientId);
            if (!element) return;

            const volume = value / 100;
            element.volume = volume;
            element.audio.volume = volume;

            const volumeLabel = document.getElementById(`volume-label-${clientId}`);
            if (volumeLabel) {
                volumeLabel.textContent = `${value}%`;
            }
        }

        // Make functions available globally
        window.toggleFullscreen = toggleFullscreen;
        window.toggleMute = toggleMute;
        window.setVolume = setVolume;
    </script>
</body>
</html>
